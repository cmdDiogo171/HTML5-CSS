<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela notas</title>
        <style>
                body {
                    font-family: Arial, Helvetica, sans-serif;
                }

                table {
                    border-collapse: collapse;
                    width: 600px;
                }

                caption {
                    font-size: 1.3em;
                    font-weight: bold;
                    padding: 10px;
                }

                th, td {
                    border: 1px solid black;
                    padding: 10px;
                    text-align: center;
                }

                thead th {
                    background-color: gray;
                    color: white;
                }

                .media {
                    background-color: gray;
                    color: white;
                    font-weight: bold;
                    text-align: left;
                }

                .area {
                    font-weight: bold;
                }

                .disciplina {
                    text-align: left;
                }
    </style>
</head>
<body>
    <table>
        
<thead>
            <tr>
                <th rowspan="2">Área</th>
                <th rowspan="2">Disciplinas</th>
                <th colspan="2">Notas</th>
                <th rowspan="2">Média</th>
            </tr>

            <tr>
                <th>Nota 1</th>
                <th>Nota </th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td>8</td>
                <td>8</td>   
                <td>8</td>   
            </tr>
            
            
            <tr>
                <td>Física</td>
                <td>8</td>
                <td>8</td>
                <td>8</td>
            </tr>

            <tr>
                <td>Química</td>
                <td>8</td>
                <td>8</td>
                <td>8</td>
            </tr>

            <tr>
                <td>Biologia</td>
                <td>8</td>
                <td>8</td>
                <td>8</td>
            </tr>

            <tr>
                <th colspan="4">Média de exatas</th>
                <td style="background-color: antiquewhite;">8.0</td>
            </tr>

            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td>8</td>
                <td>8</td>
                <td>8</td>
            </tr>

            <tr>
                <td>Geografia</td>
                <td>8</td>
                <td>8</td>
                <td>8</td>
            </tr>

            
            <tr>
                <th colspan="4" scope="row">Média de Exatas</th>
                <td style="background-color: antiquewhite;">8.0</td>
            </tr>

        </tbody>
    </table>
    
</body>
</html>
