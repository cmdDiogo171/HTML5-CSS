<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags html</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em html, podemos inserir elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag devera utilizar em cada caso</p>
    <ul>
        <li><span title="Usar a tag p">Parágrafos</span></li>
        <li><span title="Usar a tag H1">Título</span></li>
        <li><span title="Usar a tag img">Imagem</span></li>
        <li><span title="Usar a tag abbr">Abreviação</span></li>
        <li><span title="Usar a tag ol">Listas ordenadas</span></li>
        <li><span title="Usar a tag code">Código fonte</span></li>
        <li><span title="Usar a tag mark">Demarcadores de texto</span></li>

    </ul>
</body>
</html>
