<!DOCTYPE html>

<head>

    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linha</h1>
    <hr>
    <p>Você pode escrever


        um &lt;parágrafo&gt; de <! -- LESS THAN / GREATER THAN -->


        qualquer jeito. 

        Basta
        colocar 
        tudo 
        no <br> meio do par de tags
        p e /p.
    </p>
    <p>Vamos adicionar alguns símbolos especiais: 
        &reg;
        &copy;
        &euro;
        &trade;
        &pound;
        &yen;
        &cent;
        &Delta;
        &uarr;
    </p>
    <p>Vamos adicionar alguns emoji:
        &#x1F635;

    </p>

</body>
