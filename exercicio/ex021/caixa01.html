<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>

        h1 { /* box-level */
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border: 10px solid lightgray;

           /* padding-top: 10px; 
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;  ordem certa já 

             4 valores segue essa ordem, 1 valor fica igual pros 4 lados, 2 valores cima e baixo fica igual  */

            padding: 10px 10px 10px 10px;


           margin: 20px auto 40px auto; /*  margin: auto;  caixa no meio usamos auto */

           outline: 5px dashed salmon;



        }

        a { /* inline-level */
            /* display: block; usando isso vira um box-level e ao contrário também */
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px; 
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px; /* ordem certa já */

        }


    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são box-level, mas os <a href="#">os links são exemplos de caixa inline-level</a>. Vamos ver como funciona </p>
    
</body>
</html>
